<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Camping / Home</title>
    <!-- Favicon -->
    <link rel="icon" type="img/png" href="assets/logo/favicon-96x96.png">

    <!-- Bootstrap CSS link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Add custome style sheet -->
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/styles-places.css">
</head>

<body>
    <a id="top"></a>
    <header>
        <!-- Navigation bar the same on all pages with added "active" class to the active menu link  -->
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container">
                <!-- Make the logo a link to the home page -->
                <a class="navbar-brand" href="index.html">
                    <img src="assets/logo/Go_Camping_logo.png" alt="Go Camping logo" width="52"
                        class="d-inline-block align-text-top">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="prepare.html">Prepare</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="advice.html">Advice</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="places.html">Places</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main id="main-places">

        <!-- Section 4 modal + button -->
        <section class="section py-5" aria-labelledby="ask-question-heading">
            <div class="container">
                <!-- Header and button for the modal -->
                <div class="row justify-content-center text-center">
                    <div class="col-md-8 dark_background p-4 p-md-5 rounded-1">
                        <h2 id="ask-question-heading" class="mb-3">
                            Have a Question About Camping?
                        </h2>
                        <p class="mb-4">
                            Not sure where to start or need advice for your trip?
                            Send us your question and we'll help you feel prepared and confident.
                        </p>

                        <!-- Button trigger modal -->
                        <button type="button" class="btn btn-styles fw-bold px-4" data-bs-toggle="modal"
                            data-bs-target="#questionModal" aria-label="Open form to ask a camping question">
                            Ask a Question
                            <i class="fa-solid fa-paper-plane ms-2" aria-hidden="true"></i>
                        </button>
                    </div>
                </div>
            </div>
            <!-- Modal -->
            <div class="modal fade" id="questionModal" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered modal-body dark_background">
                    <div class="modal-content bg-transparent">
                        <!-- Modal header -->
                        <div class="modal-header">
                            <h3 class="modal-title" id="questionModalLabel">
                                Ask a Camping Question
                            </h3>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                                aria-label="Close"></button>
                        </div>
                        <!-- Modal body -->
                        <div class="modal-body">
                            <!-- Using GET instead of post so we get redirected to success.html -->
                            <form action="success.html" method="get">

                                <!-- Name -->
                                <div class="mb-3">
                                    <label for="userName" class="form-label">Your Name *</label>
                                    <input type="text" class="form-control" id="userName" name="name" required>
                                </div>

                                <!-- Email -->
                                <div class="mb-3">
                                    <label for="userEmail" class="form-label">Email Address *</label>
                                    <input type="email" class="form-control" id="userEmail" name="email" required>
                                </div>

                                <!-- Topic -->
                                <div class="mb-3">
                                    <label for="questionTopic" class="form-label">Topic *</label>
                                    <select class="form-select" id="questionTopic" name="topic" required>
                                        <option value="" disabled selected>Select a topic</option>
                                        <option>Choosing a campsite</option>
                                        <option>First-time camping</option>
                                        <option>Camping safety</option>
                                        <option>Camping with family</option>
                                        <option>Equipment & packing</option>
                                        <option>Other</option>
                                    </select>
                                </div>

                                <!-- Question -->
                                <div class="mb-3">
                                    <label for="userMessage" class="form-label">
                                        Your Question *
                                    </label>
                                    <textarea class="form-control" id="userMessage" name="message" rows="4"
                                        required></textarea>
                                </div>

                                <!-- Submit Button -->
                                <div class="text-end">
                                    <button type="submit" class="btn btn-styles fw-bold">
                                        Send Question
                                        <i class="fa-solid fa-check ms-2" aria-hidden="true"></i>
                                    </button>
                                </div>

                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>Go Camping - Simple and safe outdoor guidance</p>
        <ul id="social-networks">
            <li><a href="https://www.facebook.com" target="_blank"
                    aria-label="Visit our Facebook page (opens in a new tab)"><i class="fa-brands fa-facebook"></i></a>
            </li>
            <li><a href="https://www.x.com" target="_blank" aria-label="Visit our Tweeter page (opens in a new tab)"><i
                        class="fa-brands fa-twitter"></i></a></li>
            <li><a href="https://www.youtube.com" target="_blank"
                    aria-label="Visit our YouTube channel (opens in a new tab)"><i class="fa-brands fa-youtube"></i></a>
            </li>
            <li><a href="https://www.instagram.com" target="_blank"
                    aria-label="Visit our Instagram page (opens in a new tab)"><i
                        class="fa-brands fa-instagram"></i></a></li>
        </ul>
        <p>
            <a href="https://jigsaw.w3.org/css-validator/check/referer">
                <img style="border:0;width:88px;height:31px" src="https://jigsaw.w3.org/css-validator/images/vcss"
                    alt="Valid CSS!">
            </a>
        </p>
    </footer>
    <a href="#top" class="back-to-top" aria-label="Back to top">
        ↑
    </a>
    <!-- Font Awesome kit -->
    <script src="https://kit.fontawesome.com/3b20d96fa9.js" crossorigin="anonymous"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>
</body>

</html>
